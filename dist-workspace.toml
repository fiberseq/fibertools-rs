[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.30.3"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Which actions to run on pull requests
pr-run-mode = "plan"
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = true
# release-please creates the GitHub Release; cargo-dist only uploads
# artifacts to it rather than creating its own.
create-release = false
# Trigger this workflow via workflow_dispatch instead of tag-push. The
# release-please workflow dispatches it (with the tag) after creating the
# release. workflow_dispatch is the one event the default GITHUB_TOKEN is
# allowed to trigger, so this needs no PAT.
dispatch-releases = true
