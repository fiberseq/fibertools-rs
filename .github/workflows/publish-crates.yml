name: Publish to crates.io

# Publishes the workspace crates to crates.io using crates.io Trusted
# Publishing (OIDC) — no long-lived CARGO_REGISTRY_TOKEN secret required.
#
# This lives in its own file (not release.yml) because release.yml is
# autogenerated by cargo-dist and would clobber any hand edits.
on:
  # Fire automatically when the GitHub Release is published. cargo-dist's
  # `host` job creates that release at the end of a tag-triggered run.
  release:
    types: [published]
  # Also allow manual runs — e.g. to publish a release/tag that already
  # exists. Dispatch from the tag ref you want to publish.
  workflow_dispatch:

permissions:
  # Required for crates.io Trusted Publishing (OIDC token exchange).
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      # `molecular-annotation` must be published before `fibertools-rs`,
      # which depends on it. `cargo publish` blocks until each version is
      # live in the index, so the second publish can resolve the first.
      # Re-running on an unchanged version is a no-op (already-published is
      # treated as success), so future releases that don't bump the library
      # still succeed.
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail

          publish() {
            local crate="$1"
            local log
            log="$(mktemp)"
            if cargo publish --locked -p "$crate" 2>&1 | tee "$log"; then
              return 0
            fi
            # Tolerate "this version already exists" so re-runs are idempotent.
            if grep -qiE 'already (been )?(uploaded|exists)|already uploaded' "$log"; then
              echo "::notice::${crate} version already on crates.io — skipping"
              return 0
            fi
            echo "::error::Failed to publish ${crate}"
            return 1
          }

          publish molecular-annotation
          publish fibertools-rs
