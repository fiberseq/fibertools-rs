name: release-please

# Single-workflow release driver — no PAT required.
#
# release-please runs as a job on push to main. When a release PR is merged it
# creates the tag(s) + GitHub Release(s). The publish work then runs as
# downstream jobs IN THIS SAME workflow run, gated on release-please's outputs
# — so nothing relies on a tag/release *event* triggering a separate workflow,
# which the default GITHUB_TOKEN is not allowed to do. The single cross-workflow
# hop (to cargo-dist's release.yml) uses workflow_dispatch, which GITHUB_TOKEN
# *is* allowed to trigger.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      # In manifest mode, per-component outputs are prefixed with the package
      # path: "." is fibertools-rs, "molecular-annotation" is the library.
      ft_release_created: ${{ steps.rp.outputs['.--release_created'] }}
      ft_tag: ${{ steps.rp.outputs['.--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Publish both crates to crates.io via Trusted Publishing (OIDC, no stored
  # token). Runs as a gated job here — not on a `release: published` event —
  # so it needs no PAT. Idempotent and dependency-ordered: molecular-annotation
  # before fibertools-rs; already-published versions are skipped. Checks out
  # the merge commit (main HEAD), which already carries the bumped versions.
  publish-crates:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail

          publish() {
            local crate="$1"
            local log
            log="$(mktemp)"
            if cargo publish --locked -p "$crate" 2>&1 | tee "$log"; then
              return 0
            fi
            # Tolerate "this version already exists" so re-runs are idempotent.
            if grep -qiE 'already (been )?(uploaded|exists)|already uploaded' "$log"; then
              echo "::notice::${crate} version already on crates.io — skipping"
              return 0
            fi
            echo "::error::Failed to publish ${crate}"
            return 1
          }

          publish molecular-annotation
          publish fibertools-rs

  # Build the ft binaries + shell installer via cargo-dist and attach them to
  # the draft fibertools-rs release (cargo-dist then un-drafts it). Only
  # fibertools-rs ships binaries, so this runs only when it was released.
  # cargo-dist's release.yml uses `dispatch-releases = true`, so it triggers on
  # workflow_dispatch — which the default GITHUB_TOKEN is allowed to fire.
  build-binaries:
    needs: release-please
    if: ${{ needs.release-please.outputs.ft_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch cargo-dist binary build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f tag="${{ needs.release-please.outputs.ft_tag }}"
