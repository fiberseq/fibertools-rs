[workspace]
authors = ["Mitchell R. Vollger <mrvollger@gmail.com>"]
channels = ["conda-forge", "bioconda"]
description = "FIRE model training sweep + trackhub"
name = "Train-FIRE"
platforms = ["osx-64", "linux-64"]
version = "0.1.0"

[tasks]
fmt = "ruff format . && taplo format pixi.toml && snakefmt workflow/"
dry-run = { cmd = ["snakemake", "-n"] }
# Real end-to-end smoke test on the tiny .tests/ dataset. Trains two toy
# models (fixed + early-stopping) from ~150 chr19 reads. Runs in under a
# minute with no network access. Requires `--use-conda` once to materialize
# the env.
test = { cmd = ["snakemake", "--configfile", ".tests/config.yaml", "-j", "4", "--use-conda", "--rerun-incomplete", "train_only"] }
test-clean = "rm -rf results"
snakemake = { cmd = "cd $INIT_CWD && snakemake -s $PIXI_PROJECT_ROOT/workflow/Snakefile" }


[dependencies]
conda = "*"
snakemake = "==9.17.1"
snakefmt = "*"
ruff = "*"
taplo = "*"
snakemake-executor-plugin-slurm = "*"
snakemake-logger-plugin-snkmt = "*"
